<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>要約リーダー</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }
    body {
      margin: 0;
      background: Canvas;
      color: CanvasText;
    }
    header {
      border-bottom: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
      padding: 16px;
      position: sticky;
      top: 0;
      background: Canvas;
    }
    h1 {
      font-size: 20px;
      margin: 0;
    }
    .version {
      color: color-mix(in srgb, CanvasText 62%, transparent);
      font-size: 12px;
      margin-top: 4px;
    }
    main {
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 0;
      min-height: calc(100vh - 65px);
    }
    #list {
      border-right: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
      overflow: auto;
    }
    button.item {
      display: block;
      width: 100%;
      border: 0;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
      background: transparent;
      color: inherit;
      cursor: pointer;
      padding: 12px 16px;
      text-align: left;
    }
    button.item:hover,
    button.item.active {
      background: color-mix(in srgb, CanvasText 8%, transparent);
    }
    .meta {
      color: color-mix(in srgb, CanvasText 64%, transparent);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .title {
      font-size: 14px;
      font-weight: 650;
    }
    #detail {
      padding: 20px;
      max-width: 920px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 16px;
    }
    .controls button {
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 8px;
      background: color-mix(in srgb, CanvasText 8%, transparent);
      color: inherit;
      cursor: pointer;
      font: inherit;
      min-height: 40px;
      padding: 8px 12px;
    }
    .controls button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
    .controls select {
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 8px;
      background: color-mix(in srgb, CanvasText 8%, transparent);
      color: inherit;
      font: inherit;
      min-height: 40px;
      padding: 8px 12px;
    }
    .copyStatus {
      flex-basis: 100%;
      min-height: 24px;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      font: inherit;
      margin: 16px 0 0;
    }
    a {
      color: LinkText;
    }
    @media (max-width: 760px) {
      main {
        display: block;
      }
      #list {
        border-right: 0;
      }
      #detail {
        border-top: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>要約リーダー</h1>
    <div class="version">v2026-07-23 07:01 speech controls / copy</div>
  </header>
  <main>
    <section id="list" aria-label="最新要約一覧">読み込み中...</section>
    <section id="detail" aria-live="polite">左の一覧から要約を選択してください。</section>
  </main>
  <script>
    const listEl = document.querySelector("#list");
    const detailEl = document.querySelector("#detail");
    let currentText = "";
    let speechChunks = [];
    let speechIndex = 0;
    let currentUtterance = null;
    let currentDetail = null;
    let copyInProgress = false;

    const SUPPORTED_SPEECH_RATES = [0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.5];
    const DEFAULT_SPEECH_RATE = 1.5;
    const SPEECH_RATE_STORAGE_KEY = "summaryReader.speechRate";
    let selectedSpeechRate = loadSpeechRate();

    function loadSpeechRate() {
      try {
        const stored = Number(localStorage.getItem(SPEECH_RATE_STORAGE_KEY));
        if (SUPPORTED_SPEECH_RATES.includes(stored)) return stored;
      } catch (error) {
        // Storage failure must not prevent the reader from loading.
      }
      return DEFAULT_SPEECH_RATE;
    }

    function saveSpeechRate(rate) {
      if (!SUPPORTED_SPEECH_RATES.includes(rate)) return;
      selectedSpeechRate = rate;
      try {
        localStorage.setItem(SPEECH_RATE_STORAGE_KEY, String(rate));
      } catch (error) {
        // Keep the in-memory value when persistence is unavailable.
      }
    }

    function getRawContent(detail) {
      return typeof detail?.content === "string" ? detail.content : "";
    }

    function buildAiCopyText(detail) {
      const content = getRawContent(detail);
      if (!content) throw new Error("Missing content");
      const metadata = [
        ["タイトル", detail?.title],
        ["日付", detail?.date],
        ["種別", detail?.type],
        ["プレイリスト", detail?.playlist],
        ["元URL", detail?.url],
      ];
      const metadataLines = metadata
        .filter(([, value]) => value !== null && value !== undefined && String(value).trim() !== "")
        .map(([label, value]) => `${label}: ${String(value).trim()}`);
      return [
        "# コンテンツ情報",
        "",
        ...metadataLines,
        "",
        "# 内容",
        "",
        content,
      ].join("\n");
    }

    async function copyText(text) {
      if (typeof text !== "string" || text.length === 0) throw new Error("No copyable text");
      if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        await navigator.clipboard.writeText(text);
        return;
      }
      const textarea = document.createElement("textarea");
      const activeElement = document.activeElement;
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      try {
        if (!document.execCommand("copy")) throw new Error("Fallback copy failed");
      } finally {
        textarea.remove();
        activeElement?.focus?.();
      }
    }

    function showCopyFeedback(message, isError = false) {
      const status = document.querySelector("#copyStatus");
      if (!status) return;
      status.textContent = message;
      status.setAttribute("role", isError ? "alert" : "status");
      status.dataset.state = isError ? "error" : "success";
      window.clearTimeout(showCopyFeedback.timer);
      if (!isError) {
        showCopyFeedback.timer = window.setTimeout(() => {
          status.textContent = "";
          status.dataset.state = "idle";
        }, 2000);
      }
    }

    async function copyContent() {
      if (copyInProgress) return;
      copyInProgress = true;
      try {
        const content = getRawContent(currentDetail);
        if (!content) throw new Error("Missing content");
        await copyText(content);
        showCopyFeedback("本文をコピーしました");
      } catch (error) {
        showCopyFeedback(error.message === "Missing content" ? "コピーする本文がありません" : "コピーできませんでした", true);
      } finally {
        copyInProgress = false;
      }
    }

    async function copyForAi() {
      if (copyInProgress) return;
      copyInProgress = true;
      try {
        await copyText(buildAiCopyText(currentDetail));
        showCopyFeedback("AI用テキストをコピーしました");
      } catch (error) {
        showCopyFeedback(error.message === "Missing content" ? "コピーする本文がありません" : "コピーできませんでした", true);
      } finally {
        copyInProgress = false;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function renderList(items) {
      listEl.textContent = "";
      for (const item of items) {
        const button = document.createElement("button");
        button.className = "item";
        button.type = "button";
        button.innerHTML = `
          <div class="meta">${item.rank}. ${escapeHtml(item.date)} / ${escapeHtml(item.type)} ${escapeHtml(item.playlist || "")}</div>
          <div class="title">${escapeHtml(item.title)}</div>
        `;
        button.addEventListener("click", () => loadDetail(item.id, button));
        listEl.appendChild(button);
      }
    }

    function canSpeak() {
      return "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;
    }

    function cleanSpeechText(title, content) {
      return `${title}。\n\n${content || ""}`
        .replace(/^---[\s\S]*?---\s*/m, "")
        .replace(/https?:\/\/\S+/g, "")
        .replace(/\[([^\]]+)\]\([^\)]+\)/g, "$1")
        .replace(/`{1,3}[^`]*`{1,3}/g, "")
        .replace(/^\s*[-*+]\s+/gm, "")
        .replace(/^#+\s*/gm, "")
        .replace(/^\|.*\|$/gm, "")
        .replace(/\*\*|__/g, "")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function splitSpeechText(text) {
      const paragraphs = text
        .split(/\n{2,}/)
        .map(part => part.replace(/\s+/g, " ").trim())
        .filter(Boolean);
      const chunks = [];
      for (const paragraph of paragraphs) {
        if (paragraph.length <= 700) {
          chunks.push(paragraph);
          continue;
        }
        const sentences = paragraph.split(/(?<=[。！？!?])/);
        let buffer = "";
        for (const sentence of sentences) {
          if ((buffer + sentence).length > 700 && buffer) {
            chunks.push(buffer.trim());
            buffer = sentence;
          } else {
            buffer += sentence;
          }
        }
        if (buffer.trim()) chunks.push(buffer.trim());
      }
      return chunks;
    }

    function updateSpeechStatus() {
      const status = document.querySelector("#speechStatus");
      if (!status) return;
      if (!speechChunks.length) {
        status.textContent = "読み上げ対象なし";
        return;
      }
      status.textContent = `${speechIndex + 1} / ${speechChunks.length}`;
    }

    function stopSpeech() {
      if (canSpeak()) {
        window.speechSynthesis.cancel();
      }
      currentUtterance = null;
      updateSpeechStatus();
    }

    function speakCurrent(index = speechIndex) {
      if (!canSpeak() || !speechChunks.length) return;
      stopSpeech();
      speechIndex = Math.max(0, Math.min(index, speechChunks.length - 1));
      currentUtterance = new SpeechSynthesisUtterance(speechChunks[speechIndex]);
      currentUtterance.lang = "ja-JP";
      currentUtterance.rate = selectedSpeechRate;
      currentUtterance.onend = () => {
        if (speechIndex < speechChunks.length - 1) {
          speakCurrent(speechIndex + 1);
        } else {
          updateSpeechStatus();
        }
      };
      updateSpeechStatus();
      window.speechSynthesis.speak(currentUtterance);
    }

    function speakPrevious() {
      if (!speechChunks.length) return;
      speakCurrent(Math.max(0, speechIndex - 1));
    }

    function speakNext() {
      if (!speechChunks.length) return;
      speakCurrent(Math.min(speechChunks.length - 1, speechIndex + 1));
    }

    async function loadDetail(id, button) {
      stopSpeech();
      document.querySelectorAll(".item.active").forEach(el => el.classList.remove("active"));
      button.classList.add("active");
      detailEl.textContent = "読み込み中...";
      if (window.matchMedia("(max-width: 760px)").matches) {
        detailEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }
      const response = await fetch(`summaries/${encodeURIComponent(id)}.json`, { cache: "no-store" });
      if (!response.ok) throw new Error(`detail fetch failed: ${response.status}`);
      const data = await response.json();
      currentDetail = data;
      currentText = cleanSpeechText(data.title, data.content);
      speechChunks = splitSpeechText(currentText);
      speechIndex = 0;
      detailEl.innerHTML = `
        <div class="meta">${escapeHtml(data.date)} / ${escapeHtml(data.type)} ${escapeHtml(data.playlist || "")}</div>
        <h2>${escapeHtml(data.title)}</h2>
        ${data.url ? `<p><a href="${escapeHtml(data.url)}" target="_blank" rel="noreferrer">元URL</a></p>` : ""}
        <div class="controls">
          <button type="button" id="speakButton" ${canSpeak() ? "" : "disabled"}>読み上げ</button>
          <button type="button" id="stopButton" ${canSpeak() ? "" : "disabled"}>停止</button>
          <label for="speechRate">読み上げ速度</label>
          <select id="speechRate" aria-label="読み上げ速度">
            ${SUPPORTED_SPEECH_RATES.map(rate => `<option value="${rate}" ${rate === selectedSpeechRate ? "selected" : ""}>${rate.toFixed(2).replace(/0$/, "")}x</option>`).join("")}
          </select>
          <button type="button" id="prevButton" ${canSpeak() ? "" : "disabled"}>前へ</button>
          <button type="button" id="nextButton" ${canSpeak() ? "" : "disabled"}>次へ</button>
          <button type="button" id="restartButton" ${canSpeak() ? "" : "disabled"}>最初から</button>
          <button type="button" id="copyContentButton">本文をコピー</button>
          <button type="button" id="copyAiButton">AI用にコピー</button>
          <span class="meta" id="speechStatus"></span>
          <span class="meta copyStatus" id="copyStatus" aria-live="polite"></span>
        </div>
        <pre>${escapeHtml(data.content)}</pre>
      `;
      updateSpeechStatus();
      document.querySelector("#speakButton")?.addEventListener("click", () => speakCurrent(speechIndex));
      document.querySelector("#stopButton")?.addEventListener("click", stopSpeech);
      document.querySelector("#speechRate")?.addEventListener("change", event => {
        const rate = Number(event.target.value);
        if (SUPPORTED_SPEECH_RATES.includes(rate)) saveSpeechRate(rate);
      });
      document.querySelector("#prevButton")?.addEventListener("click", speakPrevious);
      document.querySelector("#nextButton")?.addEventListener("click", speakNext);
      document.querySelector("#restartButton")?.addEventListener("click", () => speakCurrent(0));
      document.querySelector("#copyContentButton")?.addEventListener("click", copyContent);
      document.querySelector("#copyAiButton")?.addEventListener("click", copyForAi);
      if (window.matchMedia("(max-width: 760px)").matches) {
        detailEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    async function main() {
      try {
        const response = await fetch("latest.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`latest fetch failed: ${response.status}`);
        const data = await response.json();
        renderList(data.items || []);
      } catch (error) {
        listEl.textContent = "取得できませんでした。";
        detailEl.textContent = error.message;
      }
    }

    main();
  </script>
</body>
</html>
