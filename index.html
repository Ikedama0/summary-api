<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>要約リーダー</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }
    body {
      margin: 0;
      background: Canvas;
      color: CanvasText;
    }
    header {
      border-bottom: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
      padding: 16px;
      position: sticky;
      top: 0;
      background: Canvas;
    }
    h1 {
      font-size: 20px;
      margin: 0;
    }
    main {
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 0;
      min-height: calc(100vh - 65px);
    }
    #list {
      border-right: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
      overflow: auto;
    }
    button.item {
      display: block;
      width: 100%;
      border: 0;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
      background: transparent;
      color: inherit;
      cursor: pointer;
      padding: 12px 16px;
      text-align: left;
    }
    button.item:hover,
    button.item.active {
      background: color-mix(in srgb, CanvasText 8%, transparent);
    }
    .meta {
      color: color-mix(in srgb, CanvasText 64%, transparent);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .title {
      font-size: 14px;
      font-weight: 650;
    }
    #detail {
      padding: 20px;
      max-width: 920px;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      font: inherit;
      margin: 16px 0 0;
    }
    a {
      color: LinkText;
    }
    @media (max-width: 760px) {
      main {
        display: block;
      }
      #list {
        border-right: 0;
      }
      #detail {
        border-top: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>要約リーダー</h1>
  </header>
  <main>
    <section id="list" aria-label="最新要約一覧">読み込み中...</section>
    <section id="detail" aria-live="polite">左の一覧から要約を選択してください。</section>
  </main>
  <script>
    const listEl = document.querySelector("#list");
    const detailEl = document.querySelector("#detail");

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function renderList(items) {
      listEl.textContent = "";
      for (const item of items) {
        const button = document.createElement("button");
        button.className = "item";
        button.type = "button";
        button.innerHTML = `
          <div class="meta">${item.rank}. ${escapeHtml(item.date)} / ${escapeHtml(item.type)} ${escapeHtml(item.playlist || "")}</div>
          <div class="title">${escapeHtml(item.title)}</div>
        `;
        button.addEventListener("click", () => loadDetail(item.id, button));
        listEl.appendChild(button);
      }
    }

    async function loadDetail(id, button) {
      document.querySelectorAll(".item.active").forEach(el => el.classList.remove("active"));
      button.classList.add("active");
      detailEl.textContent = "読み込み中...";
      if (window.matchMedia("(max-width: 760px)").matches) {
        detailEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }
      const response = await fetch(`summaries/${encodeURIComponent(id)}.json`, { cache: "no-store" });
      if (!response.ok) throw new Error(`detail fetch failed: ${response.status}`);
      const data = await response.json();
      detailEl.innerHTML = `
        <div class="meta">${escapeHtml(data.date)} / ${escapeHtml(data.type)} ${escapeHtml(data.playlist || "")}</div>
        <h2>${escapeHtml(data.title)}</h2>
        ${data.url ? `<p><a href="${escapeHtml(data.url)}" target="_blank" rel="noreferrer">元URL</a></p>` : ""}
        <pre>${escapeHtml(data.content)}</pre>
      `;
      if (window.matchMedia("(max-width: 760px)").matches) {
        detailEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    async function main() {
      try {
        const response = await fetch("latest.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`latest fetch failed: ${response.status}`);
        const data = await response.json();
        renderList(data.items || []);
      } catch (error) {
        listEl.textContent = "取得できませんでした。";
        detailEl.textContent = error.message;
      }
    }

    main();
  </script>
</body>
</html>
